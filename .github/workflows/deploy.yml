name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允許手動觸發

# 部署 Pages 所需的最小權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個 Pages 部署;讓進行中的部署跑完,不可取消
# (取消發布中的部署會導致 Pages 後端卡住,後續部署回報 Deployment failed)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
